<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NovaLang IDE</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 80%;
    max-width: 900px;
}

textarea {
    width: 100%;
    height: 200px;
    background: #1e293b;
    color: white;
    border: none;
    padding: 10px;
    font-size: 16px;
    border-radius: 8px;
}

button {
    margin-top: 10px;
    padding: 10px 20px;
    background: #22c55e;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}

.output {
    margin-top: 20px;
    background: #111827;
    padding: 15px;
    border-radius: 8px;
    min-height: 80px;
}
</style>
</head>

<body>

<div class="container">

<h1>NovaLang IDE</h1>

<textarea id="code">
let x = 10
display x
</textarea>

<br>

<button onclick="runCode()">Run</button>

<div class="output" id="output">
Output will appear here...
</div>

</div>

<script>
async function runCode() {
    const code = document.getElementById("code").value;

    try {
        const res = await fetch("/run", {   // ✅ FIXED (relative path)
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ code })
        });

        const data = await res.json();

        document.getElementById("output").innerText =
            data.output || data.error;

    } catch (err) {
        document.getElementById("output").innerText =
            "Error connecting to server.";
    }
}
</script>

</body>
</html>
